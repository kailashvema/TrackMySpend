<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login / Signup</title>
  <style>
    body {
      font-family: Arial;
      background: #f4f4f4;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      background: white;
      padding: 20px;
      border-radius: 10px;
      width: 300px;
      text-align: center;
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
    }

    button {
      width: 100%;
      padding: 10px;
      background: #3498db;
      color: white;
      border: none;
      cursor: pointer;
    }

    button:hover {
      background: #2980b9;
    }

    .toggle {
      margin-top: 10px;
      cursor: pointer;
      color: blue;
    }
  </style>
</head>
<body>

<div class="container">
  <h2 id="form-title">Login</h2>

  <input type="text" id="name" placeholder="Name (Signup only)" style="display:none;">
  <input type="email" id="email" placeholder="Email">
  <input type="password" id="password" placeholder="Password">

  <button onclick="handleAuth()">Login</button>

  <p class="toggle" onclick="toggleForm()">Don't have an account? Signup</p>
</div>

<script>
let isLogin = true;

function toggleForm() {
  isLogin = !isLogin;

  document.getElementById("form-title").innerText = isLogin ? "Login" : "Signup";
  document.querySelector("button").innerText = isLogin ? "Login" : "Signup";
  document.getElementById("name").style.display = isLogin ? "none" : "block";
  document.querySelector(".toggle").innerText =
    isLogin ? "Don't have an account? Signup" : "Already have an account? Login";
}

async function handleAuth() {
  const name = document.getElementById("name").value;
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const url = isLogin
    ? "http://localhost:5000/api/auth/login"
    : "http://localhost:5000/api/auth/signup";

  const body = isLogin
    ? { email, password }
    : { name, email, password };

  try {
    const res = await fetch(url, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify(body)
    });

    const data = await res.json();
    console.log(data);

    // 🔥 TOKEN STORE (ONLY AFTER LOGIN)
    if (isLogin && data.token) {
      localStorage.setItem("token", data.token);

      alert("Login successful ✅");

      // redirect to main app
      window.location.href = "index.html";
    } else {
      alert("Signup successful ✅ Please login");
      toggleForm();
    }

  } catch (err) {
    console.error(err);
    alert("Error occurred");
  }
}
</script>

</body>
</html>
